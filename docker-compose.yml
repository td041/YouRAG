version: '3.8'

services:
  qdrant:
    image: qdrant/qdrant:latest
    container_name: yourag-qdrant
    ports:
      - "6333:6333"
    volumes:
      - qdrant_data:/qdrant/storage
    restart: unless-stopped
    networks:
      - yourag_network

  # ── Bật lên khi cần tích hợp lịch sử chat (Chat History) ──────────────────
  # postgres:
  #   image: postgres:15-alpine
  #   container_name: yourag-postgres
  #   ports:
  #     - "5432:5432"
  #   environment:
  #     - POSTGRES_USER=yourag_user
  #     - POSTGRES_PASSWORD=yourag_pass
  #     - POSTGRES_DB=yourag_db
  #   volumes:
  #     - postgres_data:/var/lib/postgresql/data
  #   restart: unless-stopped
  #   networks:
  #     - yourag_network

  # redis:
  #   image: redis:7-alpine
  #   container_name: yourag-redis
  #   ports:
  #     - "6379:6379"
  #   volumes:
  #     - redis_data:/data
  #   restart: unless-stopped
  #   networks:
  #     - yourag_network
  # ──────────────────────────────────────────────────────────────────────────

  backend:
    build: 
      context: .
      dockerfile: Dockerfile
    container_name: yourag-backend
    ports:
      - "8000:8000"
    volumes:
      - ./src:/app/src
    environment:
      - QDRANT_SERVER_URL=http://qdrant:6333
      - GROQ_API_KEY=${GROQ_API_KEY:-your_groq_api_key_here}
      - DEVICE=cpu
      # ── Bật lên khi postgres và redis được kích hoạt ──────────────────────
      # - REDIS_URL=redis://redis:6379/0
      # - DATABASE_URL=postgresql://yourag_user:yourag_pass@postgres:5432/yourag_db
    depends_on:
      - qdrant
      # - postgres
      # - redis
    restart: unless-stopped
    networks:
      - yourag_network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: yourag-frontend
    ports:
      - "3000:3000"
    environment:
      # Lưu ý: Frontend gọi API từ trình duyệt nên dùng localhost thay vì http://backend
      - NEXT_PUBLIC_API_URL=http://localhost:8000
    depends_on:
      - backend
    restart: unless-stopped
    networks:
      - yourag_network

volumes:
  qdrant_data:
  # postgres_data:
  # redis_data:

networks:
  yourag_network:
    driver: bridge
