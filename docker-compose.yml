services:
  qdrant:
    image: qdrant/qdrant:latest
    container_name: yourag-qdrant
    ports:
      - "6333:6333"
    volumes:
      - qdrant_data:/qdrant/storage
    restart: unless-stopped
    networks:
      - yourag_network
    healthcheck:
      test: ["CMD-SHELL", "bash -c ':> /dev/tcp/localhost/6333' 2>/dev/null || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  postgres:
    image: postgres:15-alpine
    container_name: yourag-postgres
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_USER=yourag_user
      - POSTGRES_PASSWORD=yourag_pass
      - POSTGRES_DB=yourag_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped
    networks:
      - yourag_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U yourag_user -d yourag_db"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  redis:
    image: redis:7-alpine
    container_name: yourag-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: unless-stopped
    networks:
      - yourag_network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: yourag-backend
    ports:
      - "8000:8000"
    volumes:
      - ./src:/app/src
      # Mount model cache từ host — tránh tải lại 4.8GB mỗi lần rebuild
      - ~/.cache/huggingface:/root/.cache/huggingface
      - ~/.cache/torch:/root/.cache/torch
    environment:
      - QDRANT_SERVER_URL=http://qdrant:6333
      - GROQ_API_KEY=${GROQ_API_KEY}
      - JINA_API_KEY=${JINA_API_KEY:-}
      - DEVICE=cuda
      - REDIS_URL=redis://redis:6379/0
      - DATABASE_URL=postgresql://yourag_user:yourag_pass@postgres:5432/yourag_db
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 4G
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    depends_on:
      qdrant:
        condition: service_healthy
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8000/ || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 120s
    restart: unless-stopped
    networks:
      - yourag_network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: yourag-frontend
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - yourag_network

volumes:
  qdrant_data:
  postgres_data:
  redis_data:

networks:
  yourag_network:
    driver: bridge
