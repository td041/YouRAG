services:
  qdrant:
    image: qdrant/qdrant:latest
    container_name: yourag-qdrant
    ports:
      - "6333:6333"
    volumes:
      - qdrant_data:/qdrant/storage
    restart: unless-stopped
    networks:
      - yourag_network
    healthcheck:
      test: ["CMD-SHELL", "bash -c ':> /dev/tcp/localhost/6333' 2>/dev/null || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  postgres:
    image: postgres:15-alpine
    container_name: yourag-postgres
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_USER=yourag_user
      - POSTGRES_PASSWORD=yourag_pass
      - POSTGRES_DB=yourag_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres-init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    restart: unless-stopped
    networks:
      - yourag_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U yourag_user -d yourag_db"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  redis:
    image: redis:7-alpine
    container_name: yourag-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: unless-stopped
    networks:
      - yourag_network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: yourag-backend
    dns:
      - 8.8.8.8
      - 1.1.1.1
    ports:
      - "8000:8000"
    volumes:
      - ./src:/app/src
      # Benchmark reports — generated on host, read by backend API
      - ./tests/benchmark:/app/tests/benchmark:ro
      # Models đã được bake vào image (HF_HOME=/app/models trong Dockerfile).
      # Named volume giúp container restart không cần extract lại từ image layer.
      - hf_models:/app/models
    environment:
      - QDRANT_SERVER_URL=http://qdrant:6333
      - GROQ_API_KEY=${GROQ_API_KEY}
      - GROQ_API_KEYS=${GROQ_API_KEYS:-}
      - JINA_API_KEY=${JINA_API_KEY:-}
      - API_KEY=${API_KEY:-}
      - HF_HOME=/app/models
      - DEVICE=cuda
      - REDIS_URL=redis://redis:6379/0
      - DATABASE_URL=postgresql://yourag_user:yourag_pass@postgres:5432/yourag_db
      - LANGFUSE_PUBLIC_KEY=${LANGFUSE_PUBLIC_KEY:-}
      - LANGFUSE_SECRET_KEY=${LANGFUSE_SECRET_KEY:-}
      - LANGFUSE_HOST=http://langfuse:3000
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 4G
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    depends_on:
      qdrant:
        condition: service_healthy
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8000/health | grep -q 'healthy' || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 120s
    restart: unless-stopped
    networks:
      - yourag_network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        # NEXT_PUBLIC_* are baked at build time — proxy through Next.js server
        # so the browser never needs to reach port 8000 directly (avoids WSL2 issues)
        - NEXT_PUBLIC_API_URL=/api/backend
        - NEXT_PUBLIC_API_KEY=${API_KEY:-}
    container_name: yourag-frontend
    ports:
      - "3000:3000"
    dns:
      - 8.8.8.8
      - 1.1.1.1
    environment:
      - NEXT_PUBLIC_API_KEY=${API_KEY:-}
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - yourag_network
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/api/health 2>/dev/null || wget -qO- http://localhost:3000 2>/dev/null | grep -q 'YouRAG\\|__NEXT' || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 15s

  # ─── EXPERIMENT TRACKING ──────────────────────────────────────────
  mlflow:
    image: ghcr.io/mlflow/mlflow:latest
    container_name: yourag-mlflow
    ports:
      - "5001:5000"
    environment:
      - MLFLOW_BACKEND_STORE_URI=postgresql://yourag_user:yourag_pass@postgres:5432/mlflow_db
      - MLFLOW_DEFAULT_ARTIFACT_ROOT=/mlflow/artifacts
    volumes:
      - mlflow_data:/mlflow/artifacts
    command: >
      mlflow server
      --host 0.0.0.0
      --port 5000
      --backend-store-uri postgresql://yourag_user:yourag_pass@postgres:5432/mlflow_db
      --default-artifact-root /mlflow/artifacts
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - yourag_network
    healthcheck:
      test: ["CMD-SHELL", "python3 -c \"import urllib.request; urllib.request.urlopen('http://localhost:5000/health')\" 2>/dev/null || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 20s

  # ─── TRACING ──────────────────────────────────────────────────────
  langfuse:
    image: langfuse/langfuse:2
    container_name: yourag-langfuse
    ports:
      - "3002:3000"
    environment:
      - DATABASE_URL=postgresql://yourag_user:yourag_pass@postgres:5432/langfuse_db
      - NEXTAUTH_URL=http://localhost:3002
      # PRODUCTION: set LANGFUSE_NEXTAUTH_SECRET and LANGFUSE_SALT in .env (min 32 chars each)
      - NEXTAUTH_SECRET=${LANGFUSE_NEXTAUTH_SECRET:-langfuse-dev-secret-do-not-use-in-prod}
      - SALT=${LANGFUSE_SALT:-langfuse-dev-salt-do-not-use-in-prod}
      - TELEMETRY_ENABLED=false
      - LANGFUSE_ENABLE_EXPERIMENTAL_FEATURES=true
      # Auto-seed admin account + project on first start
      - LANGFUSE_INIT_ORG_ID=yourag-org
      - LANGFUSE_INIT_ORG_NAME=YouRAG
      - LANGFUSE_INIT_PROJECT_ID=yourag-project
      - LANGFUSE_INIT_PROJECT_NAME=YouRAG Production
      - LANGFUSE_INIT_PROJECT_PUBLIC_KEY=lf-pk-yourag-local
      - LANGFUSE_INIT_PROJECT_SECRET_KEY=lf-sk-yourag-local
      - LANGFUSE_INIT_USER_EMAIL=admin@gmail.com
      - LANGFUSE_INIT_USER_NAME=admin
      - LANGFUSE_INIT_USER_PASSWORD=admin1234
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - yourag_network
    healthcheck:
      test: ["CMD-SHELL", "node -e \"require('http').get('http://'+require('os').hostname()+':3000/api/public/health',r=>{process.exit(r.statusCode===200?0:1)}).on('error',()=>process.exit(1))\""]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s

  # ─── MONITORING STACK ─────────────────────────────────────────────
  prometheus:
    image: prom/prometheus:latest
    container_name: yourag-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.retention.time=7d"
    restart: unless-stopped
    networks:
      - yourag_network

  grafana:
    image: grafana/grafana:latest
    container_name: yourag-grafana
    ports:
      - "3001:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning
    restart: unless-stopped
    networks:
      - yourag_network

  loki:
    image: grafana/loki:latest
    container_name: yourag-loki
    ports:
      - "3100:3100"
    volumes:
      - ./monitoring/loki.yml:/etc/loki/local-config.yaml
      - loki_data:/loki
    command: -config.file=/etc/loki/local-config.yaml
    restart: unless-stopped
    networks:
      - yourag_network

  promtail:
    image: grafana/promtail:latest
    container_name: yourag-promtail
    volumes:
      - ./monitoring/promtail.yml:/etc/promtail/config.yml
      - /var/run/docker.sock:/var/run/docker.sock
    command: -config.file=/etc/promtail/config.yml
    restart: unless-stopped
    networks:
      - yourag_network

volumes:
  qdrant_data:
  postgres_data:
  redis_data:
  prometheus_data:
  grafana_data:
  loki_data:
  mlflow_data:
  hf_models:

networks:
  yourag_network:
    driver: bridge
    driver_opts:
      com.docker.network.bridge.enable_ip_masquerade: "true"

# DNS cho build containers (fix EAI_AGAIN trong WSL2)
x-dns: &default-dns
  dns:
    - 8.8.8.8
    - 1.1.1.1
